spring:
  application:
    name: pick-deal-api
  datasource:
    url: jdbc:h2:mem:pickdeal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:3000

logging:
  level:
    org.hibernate.SQL: debug

