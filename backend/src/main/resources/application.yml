spring:
  application:
    name: pick-deal-api
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:pickdeal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
